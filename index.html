<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Freecash x TikTok</title>
  <link rel="icon" href="data:," />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030704;
      --card: #0b1710;
      --card2: #101f16;
      --green: #39ff88;
      --green2: #19c762;
      --text: #f5fff7;
      --muted: #a7b8ab;
      --yellow: #ffd56a;
      --red: #ff5c6c;
      --line: rgba(255,255,255,.10);
      --shadow: 0 24px 70px rgba(0,0,0,.55);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(57,255,136,.35), transparent 35%),
        radial-gradient(circle at 100% 25%, rgba(255,213,106,.16), transparent 28%),
        linear-gradient(180deg, #06140b 0%, #030704 65%, #020302 100%);
      overflow-x: hidden;
    }
    body.lock { overflow: hidden; }
    a { color: inherit; text-decoration: none; }
    button, a { -webkit-tap-highlight-color: transparent; }

    /* ══════════════════════════════════════════ */
    /* STEP 1 — DEVICE SELECT (full-screen gate) */
    /* ══════════════════════════════════════════ */
    .device-gate {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at top, rgba(57,255,136,.34), transparent 38%),
        rgba(2,5,3,.97);
      transition: .3s ease;
    }
    .device-gate.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(1.04);
    }
    .device-box {
      width: 100%;
      max-width: 380px;
      padding: 30px 22px 26px;
      text-align: center;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(20,38,27,.96), rgba(6,12,8,.98));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
    }
    .device-emoji {
      width: 76px; height: 76px;
      border-radius: 24px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      font-size: 36px;
      background: linear-gradient(180deg, #67ffa3, #20d66b);
      box-shadow: 0 16px 36px rgba(57,255,136,.28);
    }
    .device-box h2 {
      font-size: 34px;
      line-height: .95;
      letter-spacing: -.055em;
      font-weight: 1000;
      margin-bottom: 10px;
    }
    .device-box h2 em {
      font-style: normal;
      color: var(--green);
      text-shadow: 0 0 24px rgba(57,255,136,.2);
    }
    .device-box p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 22px;
    }
    .device-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .device-pick {
      border: 0;
      min-height: 110px;
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      color: #f4fff7;
      background: rgba(255,255,255,.055);
      border: 1.5px solid rgba(255,255,255,.12);
    }
    .device-pick:hover {
      border-color: var(--green);
      box-shadow: 0 0 30px rgba(57,255,136,.12);
      transform: translateY(-3px);
    }
    .device-pick:active { transform: translateY(0); }
    .device-pick svg { width: 40px; height: 40px; fill: #ffffff; }
    .device-pick-label { font-size: 15px; font-weight: 900; }
    .device-pick-hint { font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

    /* ══════════════════════════════════════════ */
    /* STEP 2 — MAIN PAGE                        */
    /* ══════════════════════════════════════════ */
    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 112px;
      display: none;
    }
    .page.show {
      display: block;
      animation: mainIn .45s ease-out;
    }
    @keyframes mainIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top { display: flex; justify-content: center; align-items: center; margin-bottom: 18px; padding-top: 4px; }
    .brand-combo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 9px 13px; border-radius: 999px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 12px 34px rgba(0,0,0,.28);
    }
    .brand-combo img { width: 34px; height: 34px; border-radius: 12px; object-fit: cover; background: rgba(255,255,255,.08); }
    .brand-combo span { color: var(--green); font-size: 18px; font-weight: 1000; line-height: 1; }

    .hero { min-height: 72vh; display: flex; flex-direction: column; justify-content: center; padding: 4px 0 20px; }

    .payout-badge {
      width: fit-content; margin: 0 auto 24px; padding: 10px 15px; border-radius: 999px;
      color: #baffd0; background: rgba(57,255,136,.12);
      border: 1px solid rgba(57,255,136,.34); box-shadow: inset 0 0 20px rgba(57,255,136,.05);
      font-size: 14px; font-weight: 1000;
    }

    h1 {
      text-align: center; font-size: clamp(38px, 12vw, 54px); line-height: .98;
      letter-spacing: -.065em; font-weight: 1000; margin-bottom: 18px;
    }
    h1 span { color: var(--green); text-shadow: 0 0 30px rgba(57,255,136,.25); }

    .mini-text { max-width: 335px; margin: 0 auto 22px; text-align: center; color: #dbe6de; font-size: 17px; line-height: 1.45; font-weight: 750; }

    .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 auto 26px; max-width: 350px; }
    .chip {
      min-height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 12px; border-radius: 999px; color: #f4fff7;
      background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.12);
      font-size: 13px; font-weight: 900; text-align: center;
    }

    .section-title { margin: 22px 0 12px; color: #eee9f6; font-size: 13px; font-weight: 1000; letter-spacing: .24em; text-transform: uppercase; }

    .offer-card {
      position: relative; display: flex; align-items: center; gap: 14px;
      min-height: 112px; padding: 16px; border-radius: 28px;
      background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
    }
    .play {
      width: 58px; height: 58px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0;
      background: rgba(57,255,136,.12); border: 4px solid var(--green); color: #fff; font-size: 20px;
      box-shadow: 0 0 25px rgba(57,255,136,.26);
    }
    .offer-card strong { display: block; max-width: 205px; margin-bottom: 4px; font-size: 18px; line-height: 1.12; letter-spacing: -.03em; }
    .offer-card span { color: #dbcfe0; font-size: 13px; line-height: 1.35; font-weight: 760; }
    .hot {
      position: absolute; top: 16px; right: 16px; padding: 7px 11px; border-radius: 999px;
      background: var(--yellow); color: #3a2500; font-size: 11px; font-weight: 1000;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .rating { position: absolute; right: 20px; bottom: 17px; color: #fff; font-size: 13px; font-weight: 1000; }
    .rating i { color: var(--yellow); font-style: normal; }

    .tip-card {
      margin-top: 18px; padding: 24px 22px 19px; border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,213,106,.04));
      border: 1px solid rgba(255,213,106,.18);
      box-shadow: 0 18px 48px rgba(0,0,0,.30);
    }
    .tip-label { color: var(--yellow); font-size: 14px; font-weight: 1000; text-transform: uppercase; letter-spacing: -.02em; margin-bottom: 18px; }
    .tip-card h2 { font-size: 29px; line-height: 1.08; letter-spacing: -.055em; margin-bottom: 15px; }
    .tip-card h2 span { color: var(--yellow); }
    .tip-card p { color: #eadff0; font-size: 15px; line-height: 1.45; font-weight: 760; margin-bottom: 18px; }
    .rainbow { height: 6px; border-radius: 999px; background: linear-gradient(90deg, #39ff88, #e8ff3f, #ffbb38, #ff6b4a); box-shadow: 0 0 20px rgba(57,255,136,.22); }

    .steps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mini-step {
      min-height: 180px; padding: 18px 10px 12px; border-radius: 18px; text-align: center;
      background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
    }
    .mini-step .big { display: block; color: var(--green); font-size: 34px; line-height: 1; font-weight: 1000; margin-bottom: 10px; }
    .mini-step .icon { display: block; color: var(--green); font-size: 32px; line-height: 1; margin-bottom: 16px; }
    .mini-step strong { display: block; color: #fff; font-size: 15px; line-height: 1.12; letter-spacing: -.035em; margin-bottom: 10px; }
    .mini-step p { color: #b8c7bd; font-size: 12px; line-height: 1.35; font-weight: 700; }

    .cashout { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .cashout span { padding: 9px 11px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); color: #d7e7db; font-size: 12px; font-weight: 850; }

    .note { margin-top: 12px; color: #8fa596; text-align: center; font-size: 11px; line-height: 1.45; }

    .sticky {
      position: fixed; left: 50%; bottom: max(12px, env(safe-area-inset-bottom)); transform: translateX(-50%);
      width: min(430px, calc(100% - 24px)); z-index: 20; padding: 10px; border-radius: 26px;
      background: rgba(3,7,4,.78); border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(14px); box-shadow: 0 18px 55px rgba(0,0,0,.55);
      display: none;
    }
    .sticky.show { display: block; animation: stickyIn .4s ease-out .15s both; }
    @keyframes stickyIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .cta {
      min-height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
      gap: 10px; color: #031108; background: linear-gradient(180deg, #67ffa3, #20d66b);
      box-shadow: 0 16px 34px rgba(32,214,107,.28); font-weight: 1000; font-size: 18px;
      letter-spacing: -.035em; text-align: center;
    }
    .cta small { display: block; font-size: 11px; font-weight: 850; opacity: .72; margin-top: 2px; letter-spacing: 0; }
    .cta .cta-device-icon { width: 22px; height: 22px; fill: #031108; flex-shrink: 0; }

    footer { padding: 28px 0 8px; text-align: center; color: #718477; font-size: 11px; line-height: 1.6; }
    footer a { margin: 0 7px; color: #7f9686; }

    @media (max-width: 370px) {
      .chips { grid-template-columns: 1fr; }
      .steps-grid { grid-template-columns: 1fr; }
      .mini-step { min-height: auto; }
    }
  </style>
</head>

<body class="lock">

  <!-- ═══════════════════════════════════════ -->
  <!-- STEP 1 — Device Selection Gate         -->
  <!-- ═══════════════════════════════════════ -->
  <div class="device-gate" id="deviceGate">

      <div class="device-actions">
        <button class="device-pick" onclick="selectDevice('ios')">
          <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>

        <button class="device-pick" onclick="selectDevice('android')">
          <svg viewBox="0 0 24 24"><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V7H6v11zM3.5 7C2.67 7 2 7.67 2 8.5v7c0 .83.67 1.5 1.5 1.5S5 16.33 5 15.5v-7C5 7.67 4.33 7 3.5 7zm17 0c-.83 0-1.5.67-1.5 1.5v7c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5zm-4.97-5.84l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48C13.85.55 12.95.25 12 .25s-1.85.3-2.64.88L7.88.65c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.3 1.3C7.17 3.6 6.2 5.21 6.2 7h11.6c0-1.79-.97-3.4-2.27-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>

        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!-- STEP 2 — Main Page (empty until JS)    -->

  <main class="page" id="mainPage"></main>
  <div class="sticky" id="stickyBar"></div>

  <script>
    function selectDevice(device) {
      // Hide gate
      var gate = document.getElementById('deviceGate');
      gate.classList.add('hide');
      document.body.classList.remove('lock');

      // Build main content
      var isIOS = device === 'ios';
      var mainPage = document.getElementById('mainPage');
      mainPage.innerHTML = buildMain(device);
      mainPage.classList.add('show');

      // Build sticky CTA
      var sticky = document.getElementById('stickyBar');
      sticky.innerHTML = buildSticky(device);
      sticky.classList.add('show');

      // Propagate URL params
      var query = window.location.search;
      if (query) {
        document.querySelectorAll("a[href^='http']").forEach(function(link) {
          var href = link.getAttribute('href');
          if (href.includes('?')) {
            link.setAttribute('href', href + query.replace('?', '&'));
          } else {
            link.setAttribute('href', href + query);
          }
        });
      }
    }

    function buildSticky(device) {
      var isIOS = device === 'ios';
      var icon = isIOS
        ? '<svg class="cta-device-icon" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>'
        : '<svg class="cta-device-icon" viewBox="0 0 24 24"><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V7H6v11zM3.5 7C2.67 7 2 7.67 2 8.5v7c0 .83.67 1.5 1.5 1.5S5 16.33 5 15.5v-7C5 7.67 4.33 7 3.5 7zm17 0c-.83 0-1.5.67-1.5 1.5v7c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5zm-4.97-5.84l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48C13.85.55 12.95.25 12 .25s-1.85.3-2.64.88L7.88.65c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.3 1.3C7.17 3.6 6.2 5.21 6.2 7h11.6c0-1.79-.97-3.4-2.27-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>';
      var sub = isIOS ? 'App Store \u2014 iOS' : 'Google Play \u2014 Android';

      return '<a class="cta" href="https://taprkr.com/r/eyJ0IjoiZnJlZWNhc2gtY3BpIiwidGlkIjoiNTg3NGFjOThkZDg1MjQ1YjM1MWMiLCJ0cyI6MTc4MjEzNjE3MTYwOH0" target="_blank" rel="noopener noreferrer">'
        + icon
        + '<span>Inscrivez-vous & recevez 8 \u20ac de bonus \u2192<small>' + sub + '</small></span>'
        + '</a>';
    }

    function buildMain(device) {
      return ''
        + '<header class="top">'
        +   '<div class="brand-combo">'
        +     '<img src="assets/freecash-logo.webp" alt="Freecash">'
        +     '<span>\u00d7</span>'
        +     '<img src="assets/tiktok-logo.webp" alt="TikTok">'
        +   '</div>'
        + '</header>'

        + '<section class="hero">'
        +   '<div class="payout-badge">\u2713 50 000 000 \u20ac+ d\u00e9j\u00e0 pay\u00e9s</div>'

        +   '<h1>Soyez pay\u00e9 pour <span>scroller sur TikTok</span></h1>'

        +       '<span>Recevez des r\u00e9compenses en d\u00e9couvrant des offres et des t\u00e2ches simples.</span>'

        + '<div class="section-title">Comment \u00e7a marche</div>'

        +     '<p>D\u00e9bloquez de meilleurs paiements apr\u00e8s les premi\u00e8res offres.</p>'
        +   '</div>'

        +   '<div class="mini-step">'
        +     '<span class="big">3</span>'

        +   '</div>'
        + '</section>'

        + '<div class="cashout">'
        +   '<span>PayPal</span>'
        +   '<span>Crypto</span>'
        +   '<span>Cartes cadeaux</span>'
        + '</div>'

        + '<p class="note">Les r\u00e9compenses ne sont pas garanties et peuvent varier selon l\u2019offre, l\u2019utilisateur et la disponibilit\u00e9.</p>'

        + '<footer>'
        +   '<a href="#">Confidentialit\u00e9</a>'
        +   '<a href="#">Conditions</a>'
        +   '<a href="#">Avertissement</a><br>'
        +   '\u00a9 2026'
        + '</footer>';
    }
  </script>

</body>
</html>
